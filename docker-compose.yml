services:
  postgres:
    image: postgres:16-alpine
    container_name: iesdata-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: iesdata
      POSTGRES_PASSWORD: iesdata
      POSTGRES_DB: iesdata
    volumes:
      - iesdata_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iesdata -d iesdata"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: iesdata-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  iesdata_pg:
